name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron-shell
        run: npm install

      - name: Build
        working-directory: electron-shell
        run: npm run build

      - name: Build DMG
        working-directory: electron-shell
        run: npx electron-builder --mac --publish never

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron-shell/release/*.dmg
            electron-shell/release/*.blockmap
            electron-shell/release/latest-mac.yml
